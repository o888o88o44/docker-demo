name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull o888o88o44/docker-demo:latest
            docker stop docker-demo-app || true
            docker rm docker-demo-app || true
            docker run -d -p 8080:8080 --name docker-demo-app o888o88o44/docker-demo:latest