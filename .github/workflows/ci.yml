name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install

      # 🔥 Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🔥 Build image
      - name: Build Docker image
        run: |
          docker build -t o888o88o44/docker-demo:latest \
                       -t o888o88o44/docker-demo:${{ github.sha }} .

      # 🔥 Push image
      - name: Push Docker images
        run: |
          docker push o888o88o44/docker-demo:latest
          docker push o888o88o44/docker-demo:${{ github.sha }}