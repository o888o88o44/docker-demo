services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8083:8080"
      - "5005:5005"
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: testdb
    ports:
      - "3307:3306"